name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Tests
        run: python -m pytest
      - name: Ruff
        run: python -m ruff check .
      - name: Black
        run: python -m black --check .
      - name: Mypy
        run: python -m mypy src
